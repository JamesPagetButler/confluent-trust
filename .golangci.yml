version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    # Error handling
    - errorlint
    - nilerr
    # Style
    - revive
    - misspell
    - unconvert
    - goconst
    - nakedret
    # Performance
    - prealloc
    # Security
    - gosec

  settings:
    govet:
      enable:
        - fieldalignment
    goconst:
      # Test fixtures want consistent IDs ("AX-1", "M-1", "C-1" etc.)
      # repeated across many test cases for clarity; the default
      # min-occurrences of 3 generates more noise than signal.
      min-occurrences: 5
      min-len: 4
    nakedret:
      max-func-lines: 15
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: var-naming

formatters:
  enable:
    - gofmt
    - goimports
