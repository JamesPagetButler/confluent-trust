name: Feature request
description: Propose a new capability or improvement
labels: ["status:triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: theory_ref
    attributes:
      label: Theory reference
      description: Which Definition / Section / Theorem of v0.2 does this implement (if any)?
