name: Bug report
description: Report a defect in the CTH engine
labels: ["status:triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the inventory file (if any), exact CLI command, and Go version.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - model
        - compute
        - store (json)
        - store (muninn)
        - store (surreal)
        - report
        - cmd/cth
        - schema
        - other
    validations:
      required: true
